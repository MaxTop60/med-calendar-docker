events {
    worker_connections 1024;
}

http {
    # Подключаем MIME типы (чтобы браузер понимал, какие файлы отдаём)
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Логи (помогут при отладке)
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log debug;  # debug для начала

    # Основной сервер
    server {
        # Слушаем порт 80
        listen 80;
        
        # Имя сервера (пока localhost)
        server_name localhost;

        # 1. Обработка статических файлов Django
        location /static/ {
            alias /static/;
            # Добавляем заголовки для кэширования
            expires 30d;
            add_header Cache-Control "public, immutable";
        }

        # 2. Обработка медиа файлов Django
        location /media/ {
            alias /media/;
            expires 30d;
            add_header Cache-Control "public, immutable";
        }

        # 3. API запросы (все, что начинается с /api/)
        location /api/ {
            # Перенаправляем на бэкенд
            proxy_pass http://backend:8000/api/;
            
            # Передаём оригинальные заголовки
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # 4. Админка Django
        location /admin/ {
            proxy_pass http://backend:8000/admin/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # 5. Всё остальное (фронтенд)
        location / {
            # Перенаправляем на фронтенд
            proxy_pass http://frontend:80;
            
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # Важно для WebSocket (hot-reload фронтенда)
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }
}